<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salida</title>
    <link rel="stylesheet" href="estilos.css">
</head>
<body>

   <!-- encabezado de cuerpo de la pagina-->
<header>
  <h1 class="title">Sistema de Inventario Bodega Activos Informaticos</h1>
  <h2 class="title">ATI Soporte Técnico</h2>
</header>

<!-- menu -->
<nav class="nav-menu">
  <ul class="nav-list">
    <li class="menu-item"><a href="ingreso.html">Ingreso</a></li>
    <li class="menu-item"><a href="salida.html">Salida</a></li>
    <li class="menu-item"><a href="historial.html">Historial</a></li>
  </ul>
</nav>
  </header>
     <!-- Salida -->
<form onsubmit="registrarMovimiento(event, 'Salida')">
  <h3 class="form-title">Registro de Salida</h3>

  <div class="form-group">
    <label for="caso">Caso Asignado:</label>
    <input type="text" id="caso" required />
  </div>

  <div class="form-group">
    <label for="tecnico_salida">Técnico que solicitó activo:</label>
    <input type="text" id="tecnico_salida" required />
  </div>

  <div class="form-group">
    <label for="tecnico_entrega">Técnico que entrega el activo:</label>
    <input type="text" id="tecnico_entrega" required placeholder="Encargado de bodega"/>
  </div>

  <div class="form-group">
    <label for="patrimonio_salida">Patrimonio:</label>
    <input type="text" id="patrimonio_salida" required />
  </div>

  <!-- 🔹 Bloque nuevo: Detalles del Activo para confirmación -->
  <div class="activo-detalles">
    <h4 class="form-title">Detalles del Activo (Confirmación)</h4>

    <div class="form-group">
      <label for="descripcion_activo">Descripción:</label>
      <input type="text" id="descripcion_activo" required />
    </div>

    <div class="form-group">
      <label for="marca_activo">Marca:</label>
      <input type="text" id="marca_activo" required />
    </div>

    <div class="form-group">
      <label for="modelo_activo">Modelo:</label>
      <input type="text" id="modelo_activo" required />
    </div>
  </div>

  <!-- 🔹 Campos que deben ir debajo del bloque -->
  <div class="form-group">
    <label for="fecha_salida">Fecha de salida:</label>
    <input type="text" id="fecha_salida" required />
  </div>

  <div class="form-group">
    <label for="condicion_activo">Condición al entregar:</label>
    <input type="text" id="condicion_activo" required placeholder="Ej: Bueno, Regular"/>
  </div>

  <div class="form-group">
    <label for="observaciones_salida">Observaciones:</label>
    <textarea id="observaciones_salida"></textarea>
  </div>

  <button type="submit">Registrar Salida</button>
</form>
      </div>
</body>
</html>
